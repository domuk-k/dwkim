name: Deploy persona-api

on:
  push:
    branches: [main]
    paths:
      - 'packages/persona-api/**'
      - '.github/workflows/deploy-persona-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-persona-api
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Type check
        working-directory: packages/persona-api
        run: bun run type-check

      - name: Verify BM25 index exists
        working-directory: packages/persona-api
        run: |
          if [ ! -f data/searchIndex.json ]; then
            echo "::error::data/searchIndex.json missing. Run 'bun run build:index' locally after Cogni note changes and commit." >&2
            exit 1
          fi
          AGE_DAYS=$(( ( $(date +%s) - $(stat -c %Y data/searchIndex.json 2>/dev/null || stat -f %m data/searchIndex.json) ) / 86400 ))
          SIZE=$(wc -c < data/searchIndex.json)
          echo "searchIndex.json: ${SIZE} bytes, last modified ${AGE_DAYS} days ago"
          if [ "$AGE_DAYS" -gt 30 ]; then
            echo "::warning::searchIndex.json is ${AGE_DAYS} days old. Consider rebuilding: 'bun run build:index'"
          fi

  deploy:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        working-directory: packages/persona-api
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify health
        run: |
          for i in 1 2 3 4 5; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" https://persona-api.fly.dev/health --max-time 30)
            echo "attempt $i: HTTP $CODE"
            [ "$CODE" = "200" ] && exit 0
            sleep 5
          done
          echo "Health check failed after 5 attempts" >&2
          exit 1
