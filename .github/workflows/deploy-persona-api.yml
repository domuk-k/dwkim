name: Deploy persona-api

on:
  push:
    branches: [main]
    paths:
      - 'packages/persona-api/**'
      - '.github/workflows/deploy-persona-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-persona-api
  cancel-in-progress: true

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Type check
        working-directory: packages/persona-api
        run: bun run type-check

      - name: Verify BM25 index exists
        working-directory: packages/persona-api
        run: |
          if [ ! -f data/searchIndex.json ]; then
            echo "::error::data/searchIndex.json missing. Run 'bun run build:index' locally after Cogni note changes and commit." >&2
            exit 1
          fi
          AGE_DAYS=$(( ( $(date +%s) - $(stat -c %Y data/searchIndex.json 2>/dev/null || stat -f %m data/searchIndex.json) ) / 86400 ))
          SIZE=$(wc -c < data/searchIndex.json)
          echo "searchIndex.json: ${SIZE} bytes, last modified ${AGE_DAYS} days ago"
          if [ "$AGE_DAYS" -gt 30 ]; then
            echo "::warning::searchIndex.json is ${AGE_DAYS} days old. Consider rebuilding: 'bun run build:index'"
          fi

  deploy:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        working-directory: packages/persona-api
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify health
        run: |
          for i in 1 2 3 4 5; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" https://persona-api.fly.dev/health --max-time 30)
            echo "attempt $i: HTTP $CODE"
            [ "$CODE" = "200" ] && exit 0
            sleep 5
          done
          echo "Health check failed after 5 attempts" >&2
          exit 1

      # 실제 채팅 경로(CLI/blog 가 쓰는 prod path)를 스모크 테스트.
      # POST /api/v2/chat/stream 은 AI SDK UI Message Stream 을 반환:
      #   start → text-start → text-delta {id, delta} ... → text-end → finish (HTTP 200)
      # 성공 판정 = HTTP 200 AND 최소 1개의 non-empty `text-delta` 프레임.
      # 스트리밍 generate 가 느릴 수 있어 --max-time 60 + 5회 재시도.
      # 배포당 ~1 LLM 호출(OpenRouter) 비용 — main 배포에서만 실행되므로 허용.
      - name: Chat smoke (v2 stream)
        run: |
          for i in 1 2 3 4 5; do
            RESP=$(curl -s -w '\n%{http_code}' --max-time 60 \
              -X POST https://persona-api.fly.dev/api/v2/chat/stream \
              -H 'content-type: application/json' \
              -d '{"message":"김동욱은 어떤 개발자야?"}')
            CODE=$(printf '%s' "$RESP" | tail -n1)
            BODY=$(printf '%s' "$RESP" | sed '$d')
            echo "attempt $i: HTTP $CODE"
            # text-delta 프레임에 공백이 아닌 문자 1개 이상 포함된 delta 가 있는지 검사.
            if [ "$CODE" = "200" ] \
              && printf '%s' "$BODY" | grep -q '"text-delta"' \
              && printf '%s' "$BODY" | grep -Eq '"delta":"[^"]*[^[:space:]"][^"]*"'; then
              echo "Chat smoke passed: non-empty text-delta received."
              exit 0
            fi
            sleep 5
          done
          echo "Chat smoke failed after 5 attempts. Last response body:" >&2
          printf '%s\n' "$BODY" >&2
          exit 1
